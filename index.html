<!DOCTYPE html>
<html>
<head>
<title>RAW Creator</title>
</head>

<body>

<h2>Criar RAW</h2>

<textarea id="script" style="width:100%;height:200px;"></textarea>

<br><br>

<button onclick="create()">CRIAR RAW</button>

<br><br>

<div id="link"></div>

<script>

function create(){

let s=document.getElementById("script").value.trim()

if(!s){
alert("Digite um script")
return
}

let encoded=btoa(unescape(encodeURIComponent(s)))

let url="raw.html#"+encoded

document.getElementById("link").innerHTML=
`RAW:<br><a href="${url}" target="_blank">${url}</a>`

}

</script>

</body>
</html>
