<!DOCTYPE html>
<html>
<head>
<title>RAW Creator</title>
</head>
<body>

<h2>Criar RAW</h2>

<textarea id="script" rows="10" cols="50"></textarea><br><br>

<button onclick="criar()">Criar Link</button>

<p id="link"></p>

<script>
function id(){
return Math.random().toString(36).substring(2,10)
}

function criar(){

let s=document.getElementById("script").value

if(!s){alert("Digite um script");return}

let i=id()

localStorage.setItem("lua_"+i,s)

let url=location.origin+"/Raw1kk/main/lua."+i

document.getElementById("link").innerHTML=
'<a href="'+url+'">'+url+"</a>"
}
</script>

</body>
</html>
