<!DOCTYPE html>
<html>
<head>
<title>NerphHex RAW</title>
</head>

<body>

<h2>Criar RAW</h2>

<textarea id="script" style="width:100%;height:200px;"></textarea>
<br><br>

<button onclick="create()">CRIAR</button>

<br><br>

<div id="link"></div>

<script>

function create(){

let s=document.getElementById("script").value.trim()

if(!s){
alert("Digite um script")
return
}

let encoded=btoa(s)

let url="raw.html#"+encoded

document.getElementById("link").innerHTML=
`Link:<br><a href="${url}">${url}</a>`

}

</script>

</body>
</html>
